<h1>Task List</h1>

<a href="{% url 'create_task' %}">Create Task</a>

<ul>
    {% for task in tasks %}
        <li>
            <strong>{{ task.title }}</strong> - {{ task.description }}

            {% if task.is_completed %}
                ✅ Completed
            {% else %}
                ❌ Pending
            {% endif %}

            <a href="{% url 'update_task' task.id %}">Edit</a>
            <a href="{% url 'delete_task' task.id %}">Delete</a>
        </li>
    {% endfor %}
</ul>
